<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="東美連絡帳">
<meta name="theme-color" content="#1f3a5f">
<link rel="manifest" href="./manifest.json">
<title>東美 連絡帳</title>
<style>
  /* ============ Reset & base ============ */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
    font-size: 16px;
    color: #1c1c1e;
    background: #f7f7f8;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }
  button, input, textarea, select {
    font-family: inherit;
    font-size: inherit;
    color: inherit;
  }
  button { cursor: pointer; border: none; background: none; padding: 0; }
  input, textarea { -webkit-appearance: none; appearance: none; }
  ::placeholder { color: #a8a8ad; }

  /* ============ Layout ============ */
  #app {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
    height: 100dvh;
  }

  /* Header */
  .header {
    background: #ffffff;
    border-bottom: 1px solid #e5e5ea;
    padding: 12px 16px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    padding-top: max(12px, env(safe-area-inset-top));
  }
  .header-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .search-box {
    position: relative;
  }
  .search-box input {
    width: 100%;
    border: 1px solid #e5e5ea;
    background: #f2f2f7;
    border-radius: 10px;
    padding: 9px 14px 9px 38px;
    outline: none;
    transition: border-color .15s;
  }
  .search-box input:focus {
    border-color: #1f3a5f;
    background: #ffffff;
  }
  .search-box::before {
    content: "";
    position: absolute;
    left: 12px;
    top: 50%;
    width: 16px;
    height: 16px;
    transform: translateY(-50%);
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238e8e93' stroke-width='2'><circle cx='11' cy='11' r='7'/><path d='m21 21-4.3-4.3'/></svg>") center/contain no-repeat;
    pointer-events: none;
  }
  .search-clear {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    color: #8e8e93;
    font-size: 18px;
    line-height: 1;
    display: none;
  }
  .search-clear.show { display: block; }
  .header-actions {
    display: flex;
    gap: 6px;
  }
  .btn {
    padding: 9px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    background: #f2f2f7;
    color: #1c1c1e;
    transition: background .15s;
    min-height: 36px;
  }
  .btn:active { background: #e5e5ea; }
  .btn-primary {
    background: #1f3a5f;
    color: #ffffff;
  }
  .btn-primary:active { background: #16273f; }
  .btn-danger {
    background: #fff0f0;
    color: #c4302b;
  }
  .btn-danger:active { background: #ffe0e0; }
  .btn-ghost {
    background: transparent;
    color: #1f3a5f;
  }

  /* Main grid */
  .main {
    display: grid;
    grid-template-columns: 40px 360px 1fr;
    overflow: hidden;
    background: #f7f7f8;
  }

  /* Narrow layout (< 900px) - single pane */
  @media (max-width: 899px) {
    .main {
      grid-template-columns: 36px 1fr;
    }
    .detail-pane {
      position: fixed;
      inset: 0;
      z-index: 50;
      transform: translateX(100%);
      transition: transform .25s ease-out;
      background: #ffffff;
    }
    .detail-pane.show { transform: translateX(0); }
    .detail-back { display: inline-flex !important; }
  }
  .detail-back { display: none; }

  /* 50音 index rail */
  .gyo-rail {
    background: #ffffff;
    border-right: 1px solid #e5e5ea;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 8px 0;
    overflow-y: auto;
  }
  .gyo-rail button {
    padding: 6px 0;
    color: #1f3a5f;
    font-size: 14px;
    font-weight: 500;
    border-radius: 6px;
    margin: 1px 4px;
    text-align: center;
  }
  .gyo-rail button:active { background: #e8eef5; }
  .gyo-rail button.disabled {
    color: #c7c7cc;
    pointer-events: none;
  }

  /* List pane */
  .list-pane {
    background: #ffffff;
    border-right: 1px solid #e5e5ea;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .list-empty {
    padding: 60px 24px;
    text-align: center;
    color: #8e8e93;
  }
  .list-empty p { margin: 0 0 12px; }
  .gyo-header {
    position: sticky;
    top: 0;
    background: rgba(247, 247, 248, 0.95);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    color: #6c6c70;
    border-bottom: 1px solid #e5e5ea;
    z-index: 1;
  }
  .contact-item {
    padding: 12px 16px;
    border-bottom: 1px solid #f0f0f3;
    cursor: pointer;
    transition: background .1s;
  }
  .contact-item:active { background: #f2f2f7; }
  .contact-item.selected {
    background: #e8eef5;
  }
  .contact-name {
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 2px;
    line-height: 1.3;
  }
  .contact-furigana {
    font-size: 12px;
    color: #8e8e93;
    margin: 0 0 4px;
    line-height: 1.3;
  }
  .contact-subline {
    font-size: 13px;
    color: #6c6c70;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .highlight {
    background: #ffe7a8;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* Detail pane */
  .detail-pane {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    background: #f7f7f8;
  }
  .detail-empty {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #a8a8ad;
    text-align: center;
    padding: 40px;
  }
  .detail-empty-icon {
    width: 64px;
    height: 64px;
    opacity: 0.4;
    margin-bottom: 16px;
  }
  .detail-header {
    background: #ffffff;
    padding: 20px 24px;
    border-bottom: 1px solid #e5e5ea;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
  }
  .detail-back {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    color: #1f3a5f;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }
  .detail-back:active { background: #e8eef5; }
  .detail-name-block { min-width: 0; }
  .detail-name {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 4px;
    line-height: 1.2;
  }
  .detail-furigana {
    font-size: 13px;
    color: #6c6c70;
    margin: 0;
  }
  .detail-actions { display: flex; gap: 6px; }
  .detail-sections { padding: 16px; }
  .detail-section {
    background: #ffffff;
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .detail-row {
    padding: 12px 16px;
    border-bottom: 1px solid #f0f0f3;
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 12px;
    align-items: start;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-label {
    font-size: 13px;
    color: #6c6c70;
    padding-top: 2px;
  }
  .detail-value {
    font-size: 15px;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .detail-value a {
    color: #1f3a5f;
    text-decoration: none;
  }
  .detail-value a:active { text-decoration: underline; }
  .tel-row, .email-row {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .tel-type, .email-type {
    font-size: 11px;
    color: #8e8e93;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: #ffffff;
    border-radius: 14px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    max-height: 90dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid #e5e5ea;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title {
    font-size: 17px;
    font-weight: 600;
    margin: 0;
  }
  .modal-body {
    padding: 16px 20px;
    overflow-y: auto;
    flex: 1;
  }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid #e5e5ea;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* Form */
  .field {
    margin-bottom: 12px;
  }
  .field-label {
    display: block;
    font-size: 12px;
    color: #6c6c70;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .field input, .field textarea {
    width: 100%;
    border: 1px solid #e5e5ea;
    border-radius: 8px;
    padding: 9px 12px;
    background: #ffffff;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field textarea:focus { border-color: #1f3a5f; }
  .field textarea { resize: vertical; min-height: 80px; }
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .multi-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .multi-row {
    display: grid;
    grid-template-columns: 100px 1fr auto;
    gap: 8px;
    align-items: center;
  }
  .multi-row select {
    border: 1px solid #e5e5ea;
    border-radius: 8px;
    padding: 9px 28px 9px 10px;
    background: #ffffff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238e8e93' stroke-width='2'><path d='m6 9 6 6 6-6'/></svg>") right 8px center / 14px no-repeat;
    appearance: none;
    -webkit-appearance: none;
  }
  .multi-remove {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    color: #c4302b;
    font-size: 20px;
    line-height: 1;
  }
  .multi-remove:active { background: #ffe0e0; }
  .multi-add {
    margin-top: 4px;
    color: #1f3a5f;
    font-size: 14px;
    text-align: left;
    padding: 6px 0;
  }

  /* Import dialog */
  .import-drop {
    border: 2px dashed #c7c7cc;
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    color: #6c6c70;
    margin-bottom: 12px;
  }
  .import-drop.drag-over {
    border-color: #1f3a5f;
    background: #f0f5fb;
  }
  .import-drop input { display: none; }
  .import-log {
    background: #f2f2f7;
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    max-height: 240px;
    overflow-y: auto;
    font-family: -apple-system-monospaced, ui-monospace, monospace;
    white-space: pre-wrap;
  }
  .import-summary {
    background: #e8eef5;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
    font-size: 14px;
  }
  .import-summary strong { font-weight: 600; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1c1c1e;
    color: #ffffff;
    padding: 12px 20px;
    border-radius: 24px;
    font-size: 14px;
    z-index: 200;
    transition: transform .25s ease-out;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Confirm dialog */
  .confirm-message {
    padding: 16px 0;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header class="header">
    <div class="header-title">東美 連絡帳</div>
    <div class="search-box">
      <input id="search-input" type="search" placeholder="名前・フリガナ・電話・会社・メモから検索" autocomplete="off" spellcheck="false">
      <button class="search-clear" id="search-clear" aria-label="クリア">×</button>
    </div>
    <div class="header-actions">
      <button class="btn" id="btn-import">取込</button>
      <button class="btn" id="btn-export">書出</button>
      <button class="btn btn-primary" id="btn-new">新規</button>
    </div>
  </header>

  <!-- Main split -->
  <main class="main">
    <!-- 50音 jumper -->
    <nav class="gyo-rail" id="gyo-rail"></nav>

    <!-- Contact list -->
    <section class="list-pane" id="list-pane">
      <div class="list-empty" id="list-empty">
        <p>連絡先がまだありません</p>
        <button class="btn btn-ghost" id="empty-import">vCardファイルから取り込む</button>
      </div>
    </section>

    <!-- Detail pane -->
    <section class="detail-pane" id="detail-pane">
      <div class="detail-empty" id="detail-empty">
        <svg class="detail-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
        <p>左のリストから連絡先を選んでください</p>
      </div>
    </section>
  </main>
</div>

<!-- Edit modal -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="edit-title">新規連絡先</h2>
      <button class="btn btn-ghost" id="edit-cancel">キャンセル</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field">
          <label class="field-label">姓</label>
          <input type="text" id="f-family" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label">名</label>
          <input type="text" id="f-given" autocomplete="off">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">フリガナ（姓）</label>
          <input type="text" id="f-family-phonetic" autocomplete="off" placeholder="やまだ">
        </div>
        <div class="field">
          <label class="field-label">フリガナ（名）</label>
          <input type="text" id="f-given-phonetic" autocomplete="off" placeholder="たろう">
        </div>
      </div>
      <div class="field">
        <label class="field-label">会社・組織</label>
        <input type="text" id="f-org" autocomplete="off">
      </div>
      <div class="field">
        <label class="field-label">フリガナ（会社）</label>
        <input type="text" id="f-org-phonetic" autocomplete="off">
      </div>
      <div class="field">
        <label class="field-label">役職</label>
        <input type="text" id="f-title" autocomplete="off">
      </div>

      <div class="field">
        <label class="field-label">電話番号</label>
        <div class="multi-list" id="f-tels"></div>
        <button class="multi-add" data-add="tels">+ 電話番号を追加</button>
      </div>
      <div class="field">
        <label class="field-label">メールアドレス</label>
        <div class="multi-list" id="f-emails"></div>
        <button class="multi-add" data-add="emails">+ メールアドレスを追加</button>
      </div>
      <div class="field">
        <label class="field-label">住所</label>
        <div class="multi-list" id="f-addresses"></div>
        <button class="multi-add" data-add="addresses">+ 住所を追加</button>
      </div>
      <div class="field">
        <label class="field-label">URL</label>
        <div class="multi-list" id="f-urls"></div>
        <button class="multi-add" data-add="urls">+ URLを追加</button>
      </div>
      <div class="field">
        <label class="field-label">誕生日</label>
        <input type="date" id="f-birthday">
      </div>
      <div class="field">
        <label class="field-label">メモ</label>
        <textarea id="f-note" rows="4"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="edit-delete" style="display:none">削除</button>
      <button class="btn btn-primary" id="edit-save">保存</button>
    </div>
  </div>
</div>

<!-- Import modal -->
<div class="modal-backdrop" id="import-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">vCardから取り込み</h2>
      <button class="btn btn-ghost" id="import-close">閉じる</button>
    </div>
    <div class="modal-body">
      <label class="import-drop" id="import-drop">
        <div>
          <strong>.vcf ファイルを選択</strong>
          <p style="margin: 8px 0 0; font-size: 13px;">またはここにドラッグ＆ドロップ</p>
        </div>
        <input type="file" id="import-file" accept=".vcf,text/vcard,text/x-vcard,text/directory" multiple>
      </label>
      <div id="import-result" style="display:none">
        <div class="import-summary" id="import-summary"></div>
        <div class="import-log" id="import-log"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="import-done" style="display:none">完了</button>
    </div>
  </div>
</div>

<!-- Confirm modal -->
<div class="modal-backdrop" id="confirm-modal">
  <div class="modal" style="max-width: 380px;">
    <div class="modal-header">
      <h2 class="modal-title" id="confirm-title">確認</h2>
    </div>
    <div class="modal-body">
      <div class="confirm-message" id="confirm-message"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="confirm-cancel">キャンセル</button>
      <button class="btn btn-danger" id="confirm-ok">OK</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="./app.js"></script>
</body>
</html>
